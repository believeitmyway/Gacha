<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Gacha RPG</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gold': '#ffd700',
                        'gold-dark': '#b8860b',
                        'rpg-black': '#0a0a0a',
                        'rpg-dark': '#1a1a1a',
                        'rpg-accent': '#2a2a2a',
                    },
                    fontFamily: {
                        'fantasy': ['Cinzel', 'serif'],
                        'sans': ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'shine': 'shine 2s linear infinite',
                        'float': 'float 3s ease-in-out infinite',
                        'spin-slow': 'spin 10s linear infinite',
                        'pulse-glow': 'pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        shine: {
                            '0%': { backgroundPosition: '200% center' },
                            '100%': { backgroundPosition: '-200% center' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        'pulse-glow': {
                            '0%, 100%': { opacity: '1', transform: 'scale(1)' },
                            '50%': { opacity: '.8', transform: 'scale(1.05)' },
                        }
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- Lucide Icons (CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Cinzel', serif;
        }
        .text-gradient-gold {
            background: linear-gradient(to bottom, #fde047, #ffd700, #b8860b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .btn-primary {
            background: linear-gradient(to right, #b8860b, #ffd700);
            color: black;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(184, 134, 11, 0.2);
            transition: all 0.2s;
        }
        .btn-primary:hover {
            filter: brightness(1.1);
            transform: scale(1.02);
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .bg-glass {
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #b8860b;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ffd700;
        }
    </style>
</head>
<body class="min-h-screen relative flex flex-col">

    <!-- Background Ambience -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute top-0 left-0 w-full h-full bg-[url('https://images.unsplash.com/photo-1519074069444-1ba4fff66d16?q=80&w=2544&auto=format&fit=crop')] bg-cover bg-center opacity-20 filter blur-sm"></div>
        <div class="absolute inset-0 bg-gradient-to-b from-rpg-black/80 via-rpg-black/90 to-rpg-black"></div>
    </div>

    <!-- App Container -->
    <div id="app" class="relative z-10 container mx-auto px-4 py-8 flex-grow flex flex-col">
        <!-- Content will be injected here by JS -->
    </div>

    <!-- Modals / Overlays -->
    <div id="modal-container" class="fixed inset-0 z-50 pointer-events-none flex items-center justify-center"></div>

    <script src="items.js"></script>
    <script src="app.js"></script>
</body>
</html>
